<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    .header-inner { max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between; }

    h1 { font-size:22px;font-weight:700;color:var(--text-1);margin:0 0 4px; }
    .page-sub { font-size:14px;color:var(--text-3);margin:0 0 28px; }
    .gate { display:flex;align-items:center;justify-content:center;min-height:60vh; }
    .filter-row { display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap; }
    select.dms-input { width:auto; }

    .action-badge {
      display:inline-block;
      padding:2px 10px;
      border-radius:6px;
      font-size:11px;
      font-weight:700;
      font-family:'Barlow',sans-serif;
    }
    .badge-upload   { background:rgba(48,79,254,0.10); color:var(--accent-text); }
    .badge-delete   { background:rgba(239,68,68,0.10);  color:#ef4444; }
    .badge-update   { background:rgba(245,158,11,0.10); color:#d97706; }
    .badge-version  { background:rgba(139,92,246,0.12); color:#7c3aed; }
    .badge-invite   { background:rgba(16,185,129,0.12); color:#059669; }
    .badge-remove   { background:rgba(239,68,68,0.10);  color:#ef4444; }
    .badge-password { background:rgba(245,158,11,0.10); color:#d97706; }
    .badge-other    { background:var(--bg-subtle); color:var(--text-3); }

    .spin { animation:spin 1s linear infinite; }
    @keyframes spin { from{transform:rotate(0)}to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <header class="dms-header">
    <div class="header-inner">
      <div class="dms-logo-area">
        <a href="https://cresta.com/" target="_blank" rel="noopener" class="dms-logo-link"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 836.49 178.39" class="dms-logo-svg" fill="currentColor"><path fill-rule="evenodd" d="M171.73,100.21v-.03c-2.47-2.27-5.61-3.7-9-4.08-6.04-.67-11.87,2.4-15.17,7.5-5.54,8.55-12.16,16.72-19.7,24.27-8.29,8.29-17.38,15.5-26.8,21.31l-1.91,1.16,2.1.84c4.3,1.61,9.11,3.02,14.1,3.81l.92.16.74-.56c7.09-5.09,13.92-10.89,20.29-17.27,8.32-8.32,15.64-17.35,21.73-26.85,0,0,.4-.6,1.04-1.46.71-.96,2.2-.77,2.66.33.24.58.42,1.2.6,1.91,3.93,18.37.83,33.77-8.76,43.35-3.17,3.17-7,5.66-11.39,7.4-4.39,1.73-9.35,2.74-14.74,2.96-6.7.29-13.99-.63-21.54-2.65-8.35-2.15-15.71-5.48-20.78-8.13-12.57-6.43-24.8-15.43-35.66-26.3-11.74-11.74-21.31-25.07-27.8-38.71,6.5-13.64,16.06-26.97,27.8-38.71,10.75-10.75,22.84-19.68,35.27-26.1,5.13-2.7,12.73-6.18,21.4-8.39,7.47-1.99,14.69-2.87,21.32-2.59,5.39.22,10.35,1.23,14.74,2.96,4.39,1.73,8.22,4.22,11.39,7.4,9.58,9.58,12.7,24.98,8.76,43.35-.17.71-.36,1.32-.6,1.9-.45,1.11-1.95,1.29-2.66.33-.64-.87-1.03-1.46-1.03-1.46-6.1-9.49-13.41-18.53-21.73-26.85-6.38-6.38-13.2-12.17-20.29-17.27l-.79-.54-.87.14c-4.98.78-9.79,2.2-14.09,3.81l-2.11.8,1.92,1.2c9.43,5.81,18.51,13.01,26.8,21.31,7.65,7.65,14.36,15.94,19.93,24.63,2.94,4.58,7.92,7.24,13.21,7.24.94,0,1.89-.09,2.84-.26,2.97-.54,5.7-1.9,7.89-3.92,2.36-2.18,3.98-5.04,4.67-8.26,2.36-10.98,2.58-21.25.69-30.54-2.03-9.98-6.43-18.42-13.07-25.05C155.31,5.59,143.2.67,129.03.06c-12.32-.52-26.04,2.23-39.85,8C75.37,2.3,61.64-.46,49.33.06c-14.17.6-26.28,5.53-35,14.26C5.59,23.06.67,35.16.06,49.34c-.52,12.32,2.23,26.04,8,39.86v.02c2.36,5.16,5.25,11.11,8.32,16.56,6.59,11.16,14.95,21.87,24.66,31.58,9.05,9.05,18.99,16.92,29.34,23.29.85.52.66,1.81-.31,2.05-7.06,1.77-13.87,2.56-20.16,2.29-5.39-.22-10.35-1.23-14.74-2.96-4.39-1.73-8.22-4.22-11.39-7.4-3.17-3.17-5.66-7-7.4-11.39-1.73-4.39-2.74-9.35-2.96-14.74-.12-2.94-.05-5.99.28-9.12,0-.07.08-.73.08-.8l-.4-.63c-2.86-4.28-5.67-9.29-8.23-14.27l-1.31-2.58-.77,2.81C.77,112.63-.26,121.14.07,129.05c.6,14.17,5.53,26.28,14.26,35.01,8.73,8.73,20.84,13.66,35,14.26.98.04,1.98.07,2.97.07,11.54,0,24.17-2.76,36.87-8.06,12.71,5.29,25.35,8.06,36.87,8.06.99,0,1.99-.02,2.97-.07,14.17-.6,26.27-5.53,35-14.26,6.63-6.63,11.03-15.06,13.07-25.05,1.89-9.29,1.66-19.57-.69-30.54-.69-3.23-2.3-6.08-4.67-8.26ZM15.69,70.04c-1.78-7.07-2.56-13.88-2.29-20.18.22-5.39,1.23-10.35,2.96-14.74,1.73-4.39,4.22-8.22,7.4-11.39,3.17-3.17,7-5.66,11.39-7.4,4.39-1.73,9.35-2.74,14.74-2.96.8-.03,1.62-.06,2.43-.06,5.61,0,11.58.79,17.75,2.35.97.25,1.17,1.52.31,2.04-10.35,6.37-20.3,14.25-29.36,23.3-9.05,9.05-16.93,19-23.3,29.36-.52.85-1.8.65-2.04-.31h.01Z"/><path d="M739.56,51.7h-36.13v88.23l-15.15.03V51.72l-36.13-.03v-13.71h87.41v13.71h0ZM536.43,51.7h-59.25v29.06h46.02v13.14h-46.02v32.33h59.25v13.71h-73.95V37.99h73.95v13.7h0ZM321.45,108.69l-.54-.28-.29.54c-6.66,12.57-18.47,20.09-33.1,20.09-22.32,0-38.89-17.12-38.89-40.08s16.57-40.08,38.89-40.08c14.63,0,26.45,7.52,33.1,20.09l.3.52.53-.26,11.72-6.01.57-.3-.3-.54c-8.97-17.03-26.01-27.36-45.92-27.36-29.79,0-53.2,23.26-53.2,53.93s23.41,53.93,53.2,53.93c19.91,0,36.95-10.34,45.92-27.36l.3-.55-.56-.29-11.72-6.01v.02ZM631.2,92.66c-4.9-4.58-11.7-7.72-19.59-9.56l-19.84-4.52-1.16-.27c-5.65-1.4-9.56-3.23-12.06-5.47-2.54-2.28-3.81-5.13-3.81-9.02s2.01-7.75,5.86-10.51c3.9-2.79,9.69-4.58,16.94-4.61,14.95-.06,23,7.6,27.65,18.47l12.41-6.35c-5.29-15.6-18.73-25.78-39.92-25.78s-38.3,12.09-38.3,29.33c0,7.78,3.11,14.1,8.32,18.88,5.14,4.71,12.24,7.86,20.23,9.68l17.38,3.93c6.6,1.51,11.26,3.45,14.22,5.89,2.82,2.32,4.22,5.17,4.22,9.01,0,5.43-2.35,9.71-6.53,12.72-4.27,3.07-10.61,4.92-18.55,4.92-8.54,0-15.11-2.35-20.01-6.09-4.71-3.59-7.41-7.48-10.75-14.34l-12.03,6.16c5.01,15,19.89,27.78,42.8,27.78s40.57-12.52,40.57-31.57c0-7.61-2.94-13.89-8.07-18.68h.02ZM820.45,139.96h16.04l-34.65-92.38c-2.42-6.78-8.61-11.16-15.82-11.16h-.03c-7.22,0-13.41,4.4-15.81,11.2l-34.54,92.33h16.03l8.86-23.5h51.02l8.89,23.5h.01ZM765.62,103.01l19.09-52.81c.48-1.32,2.35-1.32,2.82,0l18.96,52.81h-40.87ZM410.5,99.15c12.17-1.81,27.02-13.18,27.02-30.65s-12.52-30.5-33.79-30.5h-46.16v101.94h14.56v-42.46c0-1.35,1.63-2.01,2.57-1.05l42.46,43.5h18.76l-39.84-40.24c7.21,0,11.44-.15,14.4-.54h.02ZM372.15,51.68h31.59c12.09,0,18.93,6.91,18.93,16.82s-6.84,18.49-18.93,18.49h-31.59v-35.3h0Z"/></svg></a>

  <!-- Password gate -->
  <div id="gate" class="gate">
    <div class="dms-card" style="padding:32px;width:100%;max-width:360px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="width:40px;height:40px;background:rgba(48,79,254,0.12);border:1px solid rgba(48,79,254,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;">
          <svg width="20" height="20" fill="none" stroke="#83A8FE" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        </div>
        <div>
          <h2 style="font-size:16px;font-weight:700;color:var(--text-1);margin:0 0 2px;">Admin Audit Log</h2>
          <p style="font-size:13px;color:var(--text-3);margin:0;">Admin verification required</p>
        </div>
      </div>
      <label class="dms-label">Your Admin Password</label>
      <input type="password" id="gate-pw" class="dms-input" placeholder="••••••••" style="margin-bottom:16px;" />
      <button class="btn-primary" id="gate-btn" style="width:100%;" onclick="verifyAndLoad()">View Audit Log</button>
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:12px;color:var(--text-3);">or</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <button id="passkey-gate-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--bg-subtle);color:var(--text-1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:500;font-family:'Barlow',sans-serif;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='var(--bg-card)'" onmouseout="this.style.background='var(--bg-subtle)'" onclick="passkeyGate()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Sign in with Passkey
      </button>
      <p id="gate-error" style="color:#ef4444;font-size:13px;margin-top:10px;display:none;"></p>
    </div>
  </div>

  <!-- Audit log content -->
  <main id="audit-main" style="display:none;">
    <h1>Admin Audit Log</h1>
    <p class="page-sub">All admin actions tracked across your Lighthouse DMS workspace.</p>
    <div class="filter-row">
      <select id="filter-action" class="dms-input" onchange="renderTable()">
        <option value="">All actions</option>
        <option value="upload_doc">Uploaded</option>
        <option value="delete_doc">Deleted</option>
        <option value="update_doc">Updated</option>
        <option value="version_upload">New Version</option>
        <option value="user_invite">Invited User</option>
        <option value="user_delete">Removed User</option>
        <option value="update_doc_password">Changed Password</option>
      </select>
    </div>
    <div id="audit-content"></div>
  </main>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let session = null;
    let allEntries = [];

    const ACTION_LABELS = {
      upload_doc:          "Uploaded",
      delete_doc:          "Deleted",
      update_doc:          "Updated",
      version_upload:      "New Version",
      user_invite:         "Invited User",
      user_delete:         "Removed User",
      update_doc_password: "Changed Password",
    };

    const ACTION_BADGE_CLASS = {
      upload_doc:          "action-badge badge-upload",
      delete_doc:          "action-badge badge-delete",
      update_doc:          "action-badge badge-update",
      version_upload:      "action-badge badge-version",
      user_invite:         "action-badge badge-invite",
      user_delete:         "action-badge badge-remove",
      update_doc_password: "action-badge badge-password",
    };

    async function init() {
      const { data: { session: s } } = await sb.auth.getSession();
      if (!s) { window.location.href = "../../admin/"; return; }
      session = s;
    }

    async function loadAudit() {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-audit`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById("audit-content").innerHTML =
          `<div style="border:1px dashed var(--border);border-radius:16px;padding:60px;text-align:center;color:#ef4444;font-size:14px;">${data.error || "Failed to load audit log."}</div>`;
      } else {
        allEntries = (data.entries || data || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      }

      document.getElementById("gate").style.display = "none";
      document.getElementById("audit-main").style.display = "block";
      renderTable();
    }

    async function verifyAndLoad() {
      const pw    = document.getElementById("gate-pw").value;
      const btn   = document.getElementById("gate-btn");
      const errEl = document.getElementById("gate-error");
      errEl.style.display = "none";
      btn.disabled = true; btn.textContent = "Verifying…";

      const { error } = await sb.auth.signInWithPassword({ email: session.user.email, password: pw });
      if (error) {
        errEl.textContent = "Incorrect password."; errEl.style.display = "block";
        btn.disabled = false; btn.textContent = "View Audit Log";
        return;
      }
      await loadAudit();
    }

    async function passkeyGate() {
      const btn   = document.getElementById("passkey-gate-btn");
      const errEl = document.getElementById("gate-error");
      errEl.style.display = "none";
      btn.disabled = true;
      btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Verifying…`;

      try {
        const startRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-auth-start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: session.user.email }),
        });
        const startData = await startRes.json();
        if (!startRes.ok) throw new Error(startData.error);

        const { user_id, ...options } = startData;
        const credential = await SimpleWebAuthnBrowser.startAuthentication(options);

        const finishRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-auth-finish`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ credential, user_id }),
        });
        const finishData = await finishRes.json();
        if (!finishRes.ok) throw new Error(finishData.error);

        const { error: verifyError } = await sb.auth.verifyOtp({ token_hash: finishData.token_hash, type: "magiclink" });
        if (verifyError) throw verifyError;

        const { data: { session: fresh } } = await sb.auth.getSession();
        session = fresh;
        await loadAudit();
      } catch (err) {
        errEl.textContent =
          err.message?.includes("NotAllowedError") || err.message?.includes("cancelled") ? "Passkey authentication was cancelled." :
          err.message?.includes("No passkey") ? "No passkey registered for this account." :
          err.message || "Passkey sign-in failed.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg> Sign in with Passkey`;
      }
    }

    function renderTable() {
      const actionFilter = document.getElementById("filter-action").value;
      const filtered = actionFilter
        ? allEntries.filter(e => e.action === actionFilter)
        : allEntries;

      const content = document.getElementById("audit-content");

      if (filtered.length === 0) {
        content.innerHTML = `<div style="border:1px dashed var(--border);border-radius:16px;padding:60px;text-align:center;color:var(--text-3);font-size:14px;">No audit entries match the current filter</div>`;
        return;
      }

      content.innerHTML = `
        <div class="dms-card" style="overflow:hidden;padding:0;">
          <div class="dms-table-wrap"><table class="dms-table">
            <thead><tr>
              <th>User</th>
              <th>Action</th>
              <th>Target</th>
              <th>Details</th>
              <th>Time</th>
            </tr></thead>
            <tbody>
              ${filtered.map(e => {
                const label = ACTION_LABELS[e.action] || e.action;
                const badgeClass = ACTION_BADGE_CLASS[e.action] || "action-badge badge-other";
                const details = e.details ? (typeof e.details === "object" ? JSON.stringify(e.details) : e.details) : "—";
                return `<tr>
                  <td style="font-size:13px;color:var(--text-2);">${e.user_email || e.user_id || "—"}</td>
                  <td><span class="${badgeClass}">${label}</span></td>
                  <td style="font-weight:500;font-size:13px;">${e.target || "—"}</td>
                  <td style="font-size:12px;color:var(--text-3);max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${String(details).replace(/"/g,'&quot;')}">${details}</td>
                  <td style="color:var(--text-2);font-size:13px;white-space:nowrap;">${new Date(e.created_at).toLocaleString()}</td>
                </tr>`;
              }).join("")}
            </tbody>
          </table></div>
        </div>
        <p style="font-size:12px;color:var(--text-3);margin-top:12px;">${filtered.length} event${filtered.length !== 1 ? "s" : ""}</p>`;
    }

    document.getElementById("gate-pw").addEventListener("keydown", e => { if (e.key === "Enter") verifyAndLoad(); });
    init();
  </script>
</body>
</html>
