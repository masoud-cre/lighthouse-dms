<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse DMS — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M9 8h9l5 5v11a1 1 0 01-1 1H9a1 1 0 01-1-1V9a1 1 0 011-1z' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cpath d='M18 8v5h5' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cline x1='11' y1='17' x2='21' y2='17' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='11' y1='20' x2='18' y2='20' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#080810] text-white min-h-screen">

  <header class="border-b border-white/8 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-lg bg-indigo-500/30 border border-indigo-400/40 flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <span class="text-sm font-semibold text-white/70 tracking-tight">Lighthouse DMS</span>
      </div>
      <div class="flex items-center gap-3">
        <a href="../upload/" class="px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-semibold transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/25">
          + Upload
        </a>
        <button id="signout-btn" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-white/50 hover:text-white text-xs font-medium transition-all duration-200">
          Sign Out
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10">
    <h1 class="text-2xl font-bold text-white mb-2">Documents</h1>
    <p class="text-white/40 text-sm mb-8">Manage your uploaded documents and track recipient access.</p>
    <div id="doc-list"></div>
  </main>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BASE_URL = window.location.origin + window.location.pathname.replace("admin/dashboard/", "");

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "../../admin/"; return; }

      const res = await fetch(`${SUPABASE_URL}/functions/v1/get-analytics`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const { documents } = await res.json();
      const list = document.getElementById("doc-list");

      if (!documents || documents.length === 0) {
        list.innerHTML = `
          <div class="border border-white/8 border-dashed rounded-2xl p-16 text-center">
            <p class="text-white/30 text-sm mb-4">No documents uploaded yet</p>
            <a href="../upload/" class="px-4 py-2 rounded-lg bg-indigo-500 hover:bg-indigo-400 text-white text-xs font-semibold transition-all">Upload your first document</a>
          </div>`;
        return;
      }

      list.innerHTML = `
        <div class="bg-white/3 border border-white/8 rounded-2xl overflow-hidden">
          <table class="w-full">
            <thead>
              <tr class="border-b border-white/8">
                <th class="text-left px-6 py-4 text-xs font-medium text-white/30 uppercase tracking-wide">Document</th>
                <th class="text-center px-4 py-4 text-xs font-medium text-white/30 uppercase tracking-wide">Views</th>
                <th class="text-center px-4 py-4 text-xs font-medium text-white/30 uppercase tracking-wide">Downloads</th>
                <th class="text-left px-6 py-4 text-xs font-medium text-white/30 uppercase tracking-wide">Link</th>
                <th class="text-left px-6 py-4 text-xs font-medium text-white/30 uppercase tracking-wide">Uploaded</th>
              </tr>
            </thead>
            <tbody>
              ${documents.map((doc, i) => `
                <tr class="${i < documents.length - 1 ? 'border-b border-white/5' : ''}">
                  <td class="px-6 py-4 text-sm font-medium text-white">${doc.name}</td>
                  <td class="px-4 py-4 text-center">
                    <span class="px-2 py-1 rounded-md bg-indigo-500/10 text-indigo-300 text-xs font-medium">${doc.views}</span>
                  </td>
                  <td class="px-4 py-4 text-center">
                    <span class="px-2 py-1 rounded-md bg-emerald-500/10 text-emerald-300 text-xs font-medium">${doc.downloads}</span>
                  </td>
                  <td class="px-6 py-4">
                    <button onclick="copyLink('${doc.slug}', this)"
                      class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-white/50 hover:text-white text-xs font-medium transition-all">
                      Copy Link
                    </button>
                  </td>
                  <td class="px-6 py-4 text-xs text-white/30">${new Date(doc.created_at).toLocaleDateString()}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
    }

    function copyLink(slug, btn) {
      navigator.clipboard.writeText(`${BASE_URL}docs/?slug=${slug}`);
      btn.textContent = "Copied!";
      btn.classList.add("text-indigo-300");
      setTimeout(() => { btn.textContent = "Copy Link"; btn.classList.remove("text-indigo-300"); }, 2000);
    }

    document.getElementById("signout-btn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "../../admin/";
    });

    init();
  </script>
</body>
</html>
