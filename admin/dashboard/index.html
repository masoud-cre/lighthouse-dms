<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse DMS — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
    header { background: white; border-bottom: 1px solid #eee; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 18px; font-weight: 700; color: #111; }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; }
    .btn-primary { background: #111; color: white; }
    .btn-primary:hover { background: #333; }
    .btn-ghost { background: transparent; color: #666; border: 1px solid #ddd; }
    .btn-ghost:hover { background: #f5f5f5; }
    main { max-width: 960px; margin: 0 auto; padding: 32px; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
    table { width: 100%; background: white; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); border-collapse: collapse; overflow: hidden; }
    th { text-align: left; padding: 14px 20px; font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #eee; }
    td { padding: 14px 20px; font-size: 14px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .badge-views { background: #eff6ff; color: #2563eb; }
    .badge-downloads { background: #f0fdf4; color: #16a34a; }
    .empty { text-align: center; padding: 60px 20px; color: #888; }
    .copy-btn { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; }
    .copy-btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Lighthouse DMS</div>
    <div class="header-actions">
      <a href="../upload/" class="btn btn-primary">+ Upload Document</a>
      <button id="signout-btn" class="btn btn-ghost">Sign Out</button>
    </div>
  </header>
  <main>
    <h2>Your Documents</h2>
    <div id="doc-list">Loading...</div>
  </main>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BASE_URL = window.location.origin + window.location.pathname.replace("admin/dashboard/", "");

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = "../../admin/"; return; }

      const res = await fetch(`${SUPABASE_URL}/functions/v1/get-analytics`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const { documents } = await res.json();
      const list = document.getElementById("doc-list");

      if (!documents || documents.length === 0) {
        list.innerHTML = `<div class="empty"><p>No documents yet.</p><br><a href="../upload/" class="btn btn-primary">Upload your first document</a></div>`;
        return;
      }

      list.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Views</th>
              <th>Downloads</th>
              <th>Shareable Link</th>
              <th>Uploaded</th>
            </tr>
          </thead>
          <tbody>
            ${documents.map(doc => `
              <tr>
                <td><strong>${doc.name}</strong></td>
                <td><span class="badge badge-views">${doc.views} views</span></td>
                <td><span class="badge badge-downloads">${doc.downloads} downloads</span></td>
                <td><button class="copy-btn" onclick="copyLink('${doc.slug}', this)">Copy Link</button></td>
                <td style="color:#888">${new Date(doc.created_at).toLocaleDateString()}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>`;
    }

    function copyLink(slug, btn) {
      const url = `${BASE_URL}docs/?slug=${slug}`;
      navigator.clipboard.writeText(url);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy Link", 2000);
    }

    document.getElementById("signout-btn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "../../admin/";
    });

    init();
  </script>
</body>
</html>
