  <!-- Passkey modal -->
  <div id="passkey-modal" class="passkey-modal" style="position:fixed;inset:0;z-index:100;display:none;">
    <div class="dms-modal-backdrop" onclick="if(event.target===this)closePasskeyModal()">
      <div class="dms-modal" style="max-width:440px;">
        <!-- Header -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div style="width:40px;height:40px;background:rgba(48,79,254,0.15);border:1px solid rgba(48,79,254,0.3);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" fill="none" stroke="#83A8FE" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          </div>
          <div>
            <h3 style="font-size:16px;font-weight:700;color:var(--text-1);margin:0 0 2px;">Passkey Management</h3>
            <p style="font-size:13px;color:var(--text-3);margin:0;">Sign in with Face ID, Touch ID, or a hardware key.</p>
          </div>
        </div>

        <!-- Existing passkeys list -->
        <div id="passkey-list" style="margin-bottom:16px;"></div>

        <!-- Register status -->

        <!-- Actions -->
        <div style="display:flex;gap:10px;">
          <button class="btn-ghost" style="flex:1;" onclick="closePasskeyModal()">Close</button>
          <button class="btn-primary" id="passkey-register-btn" style="flex:1;" onclick="registerPasskey()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:5px;vertical-align:middle;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Passkey
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BASE_URL = window.location.origin + window.location.pathname.replace("admin/dashboard/", "");
    let session = null;

    async function init() {
      const { data: { session: s } } = await sb.auth.getSession();
      if (!s) { window.location.href = "../../admin/"; return; }
      session = s;

      const res = await fetch(`${SUPABASE_URL}/functions/v1/get-analytics`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const { documents } = await res.json();
      const list = document.getElementById("doc-list");

      if (!documents || documents.length === 0) {
        list.innerHTML = `<div class="empty-state"><p style="margin:0 0 12px;">No documents uploaded yet</p><a href="../upload/" class="btn-primary" style="text-decoration:none;">Upload your first document</a></div>`;
        return;
      }

      const tbody = documents.map((doc) => {
        // Guard: short_code might be null/undefined for older docs — use empty string so shortUrl falls back
        const sc = doc.short_code || '';
        // Escape single quotes in name to avoid breaking onclick attribute
        const safeName = (doc.name || '').replace(/'/g, "\\'");
        return `
        <tr style="cursor:pointer;" onclick="openDoc('${doc.slug}', this)">
          <td style="font-weight:600;">${doc.name} <span id="loading-${doc.slug}" style="font-size:11px;color:#83A8FE;display:none;">Opening…</span></td>
          <td>${doc.has_password
            ? `<span class="badge-lock"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Protected</span>`
            : `<span class="badge-open"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>Open</span>`
          }</td>
          <td style="text-align:center;"><span class="badge-views">${doc.views}</span></td>
          <td onclick="event.stopPropagation()" style="white-space:nowrap;display:flex;gap:4px;align-items:center;padding:13px 20px;">
            <button class="btn-ghost" style="padding:5px 10px;font-size:11px;" onclick="copyLink('${doc.slug}','${sc}','${safeName}',this)">Copy Link</button>
            <button class="btn-ghost" style="padding:5px 10px;font-size:11px;" onclick="emailLink('${doc.slug}','${sc}','${safeName}')" title="Send via email">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </button>
            <a href="../doc/?slug=${doc.slug}" class="btn-ghost" style="padding:5px 10px;font-size:11px;text-decoration:none;">Manage</a>
          </td>
          <td style="color:var(--text-3);font-size:12px;">${new Date(doc.created_at).toLocaleDateString()}</td>
        </tr>`;
      }).join("");

      list.innerHTML = `
        <div class="dms-card" style="overflow:hidden;padding:0;">
          <table class="dms-table">
            <thead><tr>
              <th>Document</th><th>Password</th>
              <th style="text-align:center;">Views</th>
              <th>Link</th><th>Uploaded</th>
            </tr></thead>
            <tbody>${tbody}</tbody>
          </table>
        </div>`;
    }

    async function openDoc(slug, row) {
      const indicator = document.getElementById(`loading-${slug}`);
      if (indicator) indicator.style.display = "inline";
      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-view-doc`, {
          method: "POST",
          headers: { Authorization: `Bearer ${session.access_token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ slug }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        window.open(data.signed_url, "_blank");
      } catch (err) {
        alert("Could not open document: " + err.message);
      } finally {
        if (indicator) indicator.style.display = "none";
      }
    }

    function shortUrl(short_code, slug) {
      // short_code is '' for older docs without one — fall back to full URL
      return (short_code && short_code.length > 0)
        ? `${SUPABASE_URL}/functions/v1/r/${short_code}`
        : `${BASE_URL}docs/?slug=${slug}`;
    }

    function copyLink(slug, short_code, name, btn) {
      navigator.clipboard.writeText(shortUrl(short_code, slug));
      btn.textContent = "Copied!"; btn.style.color = "#83A8FE";
      setTimeout(() => { btn.textContent = "Copy Link"; btn.style.color = ""; }, 2000);
    }

    function emailLink(slug, short_code, name) {
      const link = shortUrl(short_code, slug);
      const subject = encodeURIComponent(`Cresta Document Access: ${name}`);
      const body = encodeURIComponent(
        `Hi,\n\nYou've been given access to the following document:\n\n${name}\n\nAccess it here:\n${link}\n\n`
        + `You might need the password to view it — reach out if you haven't received it.\n\nBest,\n${session?.user?.email ?? 'Cresta Team'}`
      );
      window.open(`mailto:?subject=${subject}&body=${body}`, '_blank');
    }

    // ── Passkey management ───────────────────────────────────────────────────
    async function openPasskeyModal() {
      document.getElementById("passkey-modal").style.display = "block";
      document.getElementById("passkey-status").style.display = "none";
      document.getElementById("passkey-register-btn").disabled = false;
      document.getElementById("passkey-register-btn").innerHTML =
        '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:5px;vertical-align:middle;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>Add Passkey';
      await loadPasskeyList();
    }
    function closePasskeyModal() { document.getElementById("passkey-modal").style.display = "none"; }

    async function loadPasskeyList() {
      const listEl = document.getElementById("passkey-list");
      listEl.innerHTML = '<p style="font-size:13px;color:var(--text-3);">Loading…</p>';
      const { data, error } = await sb
        .from("passkey_credentials")
        .select("credential_id, created_at, transports")
        .eq("user_id", session.user.id)
        .order("created_at", { ascending: false });

      if (error || !data || data.length === 0) {
        listEl.innerHTML = '<p style="font-size:13px;color:var(--text-3);margin:0 0 4px;">No passkeys registered yet.</p>';
        return;
      }

      const typeLabel = (transports) => {
        if (!transports || transports.length === 0) return "Passkey";
        if (transports.includes("internal")) return "Device passkey (Touch ID / Face ID)";
        if (transports.includes("usb") || transports.includes("nfc")) return "Hardware key";
        if (transports.includes("hybrid")) return "Phone / QR passkey";
        return "Passkey";
      };

      listEl.innerHTML = `
        <p style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Registered Passkeys</p>
        <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;">
          ${data.map(pk => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg-subtle);border:1px solid var(--border);border-radius:10px;">
              <div style="display:flex;align-items:center;gap:10px;">
                <svg width="16" height="16" fill="none" stroke="#83A8FE" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                <div>
                  <p style="font-size:13px;font-weight:500;color:var(--text-1);margin:0;">${typeLabel(pk.transports)}</p>
                  <p style="font-size:11px;color:var(--text-3);margin:0;">Added ${new Date(pk.created_at).toLocaleDateString()}</p>
                </div>
              </div>
              <button onclick="removePasskey('${pk.credential_id}', this)"
                style="padding:4px 10px;font-size:11px;font-weight:600;color:#ef4444;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:7px;cursor:pointer;transition:background 0.15s;"
                onmouseover="this.style.background='rgba(239,68,68,0.15)'" onmouseout="this.style.background='rgba(239,68,68,0.08)'">
                Remove
              </button>
            </div>
          `).join("")}
        </div>`;
    }

    async function removePasskey(credentialId, btn) {
      if (!confirm("Remove this passkey? You can add a new one at any time.")) return;
      btn.disabled = true; btn.textContent = "Removing…";
      const { error } = await sb
        .from("passkey_credentials")
        .delete()
        .eq("credential_id", credentialId)
        .eq("user_id", session.user.id);
      if (error) {
        btn.disabled = false; btn.textContent = "Remove";
        alert("Failed to remove passkey: " + error.message);
      } else {
        await loadPasskeyList();
      }
    }

    async function registerPasskey() {
      const btn    = document.getElementById("passkey-register-btn");
      const status = document.getElementById("passkey-status");
      btn.disabled = true; btn.textContent = "Requesting…";
      status.style.display = "block"; status.style.color = "var(--text-2)";
      status.textContent = "Generating registration options…";

      try {
        // Guard: SimpleWebAuthnBrowser must be loaded
        if (typeof SimpleWebAuthnBrowser === "undefined") {
          throw new Error("WebAuthn library not loaded. Please refresh the page.");
        }

        // Guard: ensure we have a fresh session
        const { data: { session: freshSession } } = await sb.auth.getSession();
        if (!freshSession) throw new Error("Session expired. Please sign in again.");
        session = freshSession;

        // 1. Get registration options from server
        const optRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-register-start`, {
          method: "POST",
          headers: { Authorization: `Bearer ${session.access_token}`, "Content-Type": "application/json" },
        });
        const optBody = await optRes.json();
        if (!optRes.ok) throw new Error(optBody.error || `Server error ${optRes.status}`);

        status.textContent = "Waiting for your device authenticator…";

        // 2. Trigger browser authenticator — v10 takes options directly (no { optionsJSON } wrapper)
        const credential = await SimpleWebAuthnBrowser.startRegistration(optBody);

        status.textContent = "Verifying with server…";

        // 3. Send credential to server
        const verRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-register-finish`, {
          method: "POST",
          headers: { Authorization: `Bearer ${session.access_token}`, "Content-Type": "application/json" },
          body: JSON.stringify(credential),
        });
        const verBody = await verRes.json();
        if (!verRes.ok) throw new Error(verBody.error || `Verification error ${verRes.status}`);

        status.style.color = "#34d399";
        status.textContent = "✓ Passkey registered! You can now sign in with your device.";
        btn.textContent = "Done";
        await loadPasskeyList();
        setTimeout(closePasskeyModal, 2500);
      } catch (err) {
        status.style.color = "#ef4444";
        // Friendly messages for known WebAuthn errors
        const msg = err.message || "";
        status.textContent =
          msg.includes("NotAllowedError") || msg.includes("cancelled") ? "Cancelled — try again when ready." :
          msg.includes("NotSupportedError") ? "This device or browser doesn't support passkeys." :
          msg.includes("InvalidStateError") ? "A passkey is already registered on this device." :
          msg || "Registration failed. Please try again.";
        btn.disabled = false; btn.textContent = "Try Again";
      }
    }

    document.getElementById("signout-btn").addEventListener("click", async () => {
      await sb.auth.signOut();
      window.location.href = "../../admin/";
    });

    init();
  </script>
</body>
</html>
