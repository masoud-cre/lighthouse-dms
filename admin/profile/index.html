<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){var t=localStorage.getItem("dms-theme")||"system";document.documentElement.setAttribute("data-theme",t==="dark"||(t==="system"&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light");})();</script>

  <style>
    .header-inner { max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between; }
    main { max-width:1100px;margin:0 auto;padding:36px 24px; }
    h1 { font-size:22px;font-weight:700;color:var(--text-1);margin:0 0 4px; }
    .page-sub { font-size:14px;color:var(--text-3);margin:0 0 28px; }

    .sections { display:flex;flex-direction:column;gap:20px;max-width:560px; }

    .section-title {
      font-size:15px;font-weight:700;color:var(--text-1);margin:0 0 4px;
    }
    .section-sub {
      font-size:13px;color:var(--text-3);margin:0 0 20px;
    }

    .field-group { display:flex;flex-direction:column;gap:14px; }
    .field-row { display:flex;flex-direction:column;gap:0; }

    .pw-wrap {
      position:relative;
    }
    .pw-wrap .dms-input {
      padding-right:44px;
    }
    .pw-toggle {
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:4px;
      color:var(--text-3);display:flex;align-items:center;
      transition:color 0.15s;
    }
    .pw-toggle:hover { color:var(--text-1); }

    .msg {
      font-size:13px;margin-top:10px;display:none;
      padding:10px 14px;border-radius:8px;
    }
    .msg.success {
      background:rgba(52,211,153,0.12);
      color:#059669;
      border:1px solid rgba(52,211,153,0.25);
    }
    .msg.error {
      background:rgba(239,68,68,0.08);
      color:#ef4444;
      border:1px solid rgba(239,68,68,0.2);
    }

    .input-readonly {
      background:var(--bg-subtle) !important;
      color:var(--text-3) !important;
      cursor:not-allowed;
    }
  </style>
</head>
<body>

    <div class="header-inner">
      <div class="dms-logo-area">

1.32,2.82,0l18.96,52.81h-40.87ZM410.5,99.15c12.17-1.81,27.02-13.18,27.02-30.65s-12.52-30.5-33.79-30.5h-46.16v101.94h14.56v-42.46c0-1.35,1.63-2.01,2.57-1.05l42.46,43.5h18.76l-39.84-40.24c7.21,0,11.44-.15,14.4-.54h.02ZM372.15,51.68h31.59c12.09,0,18.93,6.91,18.93,16.82s-6.84,18.49-18.93,18.49h-31.59v-35.3h0Z"/></svg></a>

  </header>

  <main>
    <h1>Profile</h1>
    <p class="page-sub">Manage your account information and password.</p>

    <div class="sections">

      <!-- Account Info -->
      <div class="dms-card" style="padding:28px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div style="width:40px;height:40px;background:var(--accent-soft);border:1px solid rgba(48,79,254,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" fill="none" stroke="#83A8FE" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div>
            <p class="section-title" style="margin-bottom:0;">Account Info</p>
            <p style="font-size:13px;color:var(--text-3);margin:0;">Update your display name.</p>
          </div>
        </div>

        <div class="field-group">
          <div class="field-row">
            <label class="dms-label" for="email-field">Email</label>
            <input type="email" id="email-field" class="dms-input input-readonly" readonly placeholder="Loading…" />
          </div>
          <div class="field-row">
            <label class="dms-label" for="name-field">Full Name</label>
            <input type="text" id="name-field" class="dms-input" placeholder="Your full name" />
          </div>
        </div>

        <button class="btn-primary" id="save-name-btn" style="margin-top:18px;" onclick="saveName()">Save Changes</button>
        <div id="name-msg" class="msg"></div>
      </div>

      <!-- Change Password -->
      <div class="dms-card" style="padding:28px;">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div style="width:40px;height:40px;background:var(--accent-soft);border:1px solid rgba(48,79,254,0.25);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="20" height="20" fill="none" stroke="#83A8FE" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <div>
            <p class="section-title" style="margin-bottom:0;">Change Password</p>
            <p style="font-size:13px;color:var(--text-3);margin:0;">Minimum 8 characters required.</p>
          </div>
        </div>

        <div class="field-group">
          <div class="field-row">
            <label class="dms-label" for="new-pw">New Password</label>
            <div class="pw-wrap">
              <input type="password" id="new-pw" class="dms-input" placeholder="••••••••" />
              <button class="pw-toggle" type="button" onclick="togglePw('new-pw', this)" aria-label="Show/hide password">
                <svg id="new-pw-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
          <div class="field-row">
            <label class="dms-label" for="confirm-pw">Confirm Password</label>
            <div class="pw-wrap">
              <input type="password" id="confirm-pw" class="dms-input" placeholder="••••••••" />
              <button class="pw-toggle" type="button" onclick="togglePw('confirm-pw', this)" aria-label="Show/hide password">
                <svg id="confirm-pw-eye" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
              </button>
            </div>
          </div>
        </div>

        <button class="btn-primary" id="save-pw-btn" style="margin-top:18px;" onclick="savePassword()">Update Password</button>
        <div id="pw-msg" class="msg"></div>
      </div>

    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let session = null;

    async function init() {
      const { data: { session: s } } = await sb.auth.getSession();
      if (!s) { window.location.href = "../../admin/"; return; }
      session = s;

      document.getElementById("email-field").value = session.user.email || "";

      // Load full_name from user_profiles
      const { data } = await sb
        .from("user_profiles")
        .select("full_name")
        .eq("id", session.user.id)
        .single();

      if (data && data.full_name) {
        document.getElementById("name-field").value = data.full_name;
      }
    }

    async function saveName() {
      const btn   = document.getElementById("save-name-btn");
      const msgEl = document.getElementById("name-msg");
      const name  = document.getElementById("name-field").value.trim();

      showMsg(msgEl, "", "");
      btn.disabled = true;
      btn.textContent = "Saving…";

      const { error } = await sb
        .from("user_profiles")
        .update({ full_name: name })
        .eq("id", session.user.id);

      if (error) {
        showMsg(msgEl, "Failed to save: " + error.message, "error");
      } else {
        showMsg(msgEl, "Name updated successfully.", "success");
      }

      btn.disabled = false;
      btn.textContent = "Save Changes";
    }

    async function savePassword() {
      const btn     = document.getElementById("save-pw-btn");
      const msgEl   = document.getElementById("pw-msg");
      const newPw   = document.getElementById("new-pw").value;
      const confPw  = document.getElementById("confirm-pw").value;

      showMsg(msgEl, "", "");

      if (newPw.length < 8) {
        showMsg(msgEl, "Password must be at least 8 characters.", "error");
        return;
      }
      if (newPw !== confPw) {
        showMsg(msgEl, "Passwords do not match.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Updating…";

      const { error } = await sb.auth.updateUser({ password: newPw });

      if (error) {
        showMsg(msgEl, "Failed to update password: " + error.message, "error");
      } else {
        showMsg(msgEl, "Password updated successfully.", "success");
        document.getElementById("new-pw").value = "";
        document.getElementById("confirm-pw").value = "";
      }

      btn.disabled = false;
      btn.textContent = "Update Password";
    }

    function showMsg(el, text, type) {
      if (!text) { el.style.display = "none"; return; }
      el.textContent = text;
      el.className = "msg " + type;
      el.style.display = "block";
      if (type === "success") {
        setTimeout(() => { el.style.display = "none"; }, 3500);
      }
    }

    function togglePw(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const isText = input.type === "text";
      input.type = isText ? "password" : "text";
      // Swap between eye and eye-off icons
      btn.innerHTML = isText
        ? `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`
        : `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`;
    }

    init();
  </script>
</body>
</html>
