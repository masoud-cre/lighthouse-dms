<html lang="en">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

</head>
<body class="bg-[#080810] text-white min-h-screen">

  <!-- Header -->
  <header class="border-b border-white/8 px-6 py-4">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 836.49 178.39" class="h-5 w-auto opacity-90" fill="white">

          <path d="M739.56,51.7h-36.13v88.23l-15.15.03V51.72l-36.13-.03v-13.71h87.41v13.71h0ZM536.43,51.7h-59.25v29.06h46.02v13.14h-46.02v32.33h59.25v13.71h-73.95V37.99h73.95v13.7h0ZM321.45,108.69l-.54-.28-.29.54c-6.66,12.57-18.47,20.09-33.1,20.09-22.32,0-38.89-17.12-38.89-40.08s16.57-40.08,38.89-40.08c14.63,0,26.45,7.52,33.1,20.09l.3.52.53-.26,11.72-6.01.57-.3-.3-.54c-8.97-17.03-26.01-27.36-45.92-27.36-29.79,0-53.2,23.26-53.2,53.93s23.41,53.93,53.2,53.93c19.91,0,36.95-10.34,45.92-27.36l.3-.55-.56-.29-11.72-6.01v.02ZM631.2,92.66c-4.9-4.58-11.7-7.72-19.59-9.56l-19.84-4.52-1.16-.27c-5.65-1.4-9.56-3.23-12.06-5.47-2.54-2.28-3.81-5.13-3.81-9.02s2.01-7.75,5.86-10.51c3.9-2.79,9.69-4.58,16.94-4.61,14.95-.06,23,7.6,27.65,18.47l12.41-6.35c-5.29-15.6-18.73-25.78-39.92-25.78s-38.3,12.09-38.3,29.33c0,7.78,3.11,14.1,8.32,18.88,5.14,4.71,12.24,7.86,20.23,9.68l17.38,3.93c6.6,1.51,11.26,3.45,14.22,5.89,2.82,2.32,4.22,5.17,4.22,9.01,0,5.43-2.35,9.71-6.53,12.72-4.27,3.07-10.61,4.92-18.55,4.92-8.54,0-15.11-2.35-20.01-6.09-4.71-3.59-7.41-7.48-10.75-14.34l-12.03,6.16c5.01,15,19.89,27.78,42.8,27.78s40.57-12.52,40.57-31.57c0-7.61-2.94-13.89-8.07-18.68h.02ZM820.45,139.96h16.04l-34.65-92.38c-2.42-6.78-8.61-11.16-15.82-11.16h-.03c-7.22,0-13.41,4.4-15.81,11.2l-34.54,92.33h16.03l8.86-23.5h51.02l8.89,23.5h.01ZM765.62,103.01l19.09-52.81c.48-1.32,2.35-1.32,2.82,0l18.96,52.81h-40.87ZM410.5,99.15c12.17-1.81,27.02-13.18,27.02-30.65s-12.52-30.5-33.79-30.5h-46.16v101.94h14.56v-42.46c0-1.35,1.63-2.01,2.57-1.05l42.46,43.5h18.76l-39.84-40.24c7.21,0,11.44-.15,14.4-.54h.02ZM372.15,51.68h31.59c12.09,0,18.93,6.91,18.93,16.82s-6.84,18.49-18.93,18.49h-31.59v-35.3h0Z"/>
        </svg>
        <div class="w-px h-4 bg-white/15"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-6 h-6 rounded-md bg-indigo-500/30 border border-indigo-400/40 flex items-center justify-center">
            <svg class="w-3 h-3 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <span class="text-xs font-semibold text-white/50 tracking-tight">Lighthouse DMS</span>
        </div>
      </div>
      <a href="../dashboard/" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-white/50 hover:text-white text-xs font-medium transition-all">← Dashboard</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10" id="main">
    <div class="text-white/30 text-sm">Loading...</div>
  </main>

  <!-- Admin password confirmation modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 modal-bg flex items-center justify-center z-50 px-4">
    <div class="bg-[#12121f] border border-white/10 rounded-2xl p-6 w-full max-w-sm">
      <h3 class="text-base font-bold text-white mb-1" id="modal-title">Confirm Identity</h3>
      <p class="text-white/40 text-sm mb-5" id="modal-desc">Enter your admin password to continue.</p>
      <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wide">Your Admin Password</label>
      <input type="password" id="modal-pw" placeholder="••••••••"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 text-sm outline-none focus:border-indigo-500/60 transition-all mb-4" />
      <div id="modal-new-pw-wrap" class="hidden mb-4">
        <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wide">New Password</label>
        <input type="text" id="modal-new-pw" placeholder="New recipient password"
          class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 text-sm outline-none focus:border-indigo-500/60 transition-all" />
      </div>
      <p id="modal-error" class="text-red-400 text-xs mb-4 hidden"></p>
      <div class="flex gap-3">
        <button id="modal-cancel" class="flex-1 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 text-white/50 hover:text-white text-sm font-medium transition-all">Cancel</button>
        <button id="modal-confirm" class="flex-1 py-2.5 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-semibold transition-all disabled:opacity-50">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BASE_URL = window.location.origin + window.location.pathname.replace("admin/doc/", "");
    const slug = new URLSearchParams(window.location.search).get("slug");

    let currentAction = null; // 'remove' or 'change'
    let docHasPassword = false;
    let session = null;

    async function init() {
      const { data: { session: s } } = await sb.auth.getSession();
      if (!s) { window.location.href = "../../admin/"; return; }
      session = s;

      // Fetch doc analytics
      const res = await fetch(`${SUPABASE_URL}/functions/v1/get-analytics?slug=${slug}`, {
        headers: { Authorization: `Bearer ${session.access_token}` }
      });
      const data = await res.json();
      if (!res.ok || !data.doc) { document.getElementById("main").innerHTML = `<p class="text-red-400">Document not found.</p>`; return; }

      docHasPassword = data.has_password;
      renderPage(data);
    }

    function renderPage(data) {
      const BASE_URL_DOCS = `${BASE_URL}docs/?slug=${slug}`;
      document.getElementById("main").innerHTML = `
        <div class="flex items-start justify-between flex-wrap gap-4 mb-10">
          <div>
            <h1 class="text-2xl font-bold text-white mb-1">${data.doc}</h1>
            <div class="flex items-center gap-2 mt-2">
              ${data.has_password
                ? `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-amber-500/10 text-amber-300 text-xs font-medium"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>Password protected</span>`
                : `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md bg-white/5 text-white/40 text-xs font-medium"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>No password</span>`
              }
            </div>
          </div>
          <div class="flex gap-3 flex-wrap">
            <button onclick="copyLink()" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-white/60 hover:text-white text-xs font-medium transition-all" id="copy-btn">Copy Link</button>
            <button onclick="openModal('change')" class="px-4 py-2 rounded-lg bg-indigo-500/20 hover:bg-indigo-500/30 border border-indigo-500/30 text-indigo-300 text-xs font-medium transition-all">
              ${data.has_password ? 'Change Password' : 'Add Password'}
            </button>
            ${data.has_password ? `<button onclick="openModal('remove')" class="px-4 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 text-xs font-medium transition-all">Remove Password</button>` : ''}
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 gap-4 mb-10 max-w-sm">
          <div class="bg-white/3 border border-white/8 rounded-xl p-5">
            <p class="text-white/40 text-xs mb-1">Total Views</p>
            <p class="text-3xl font-bold text-indigo-300">${data.views}</p>
          </div>
          <div class="bg-white/3 border border-white/8 rounded-xl p-5">
            <p class="text-white/40 text-xs mb-1">Downloads</p>
            <p class="text-3xl font-bold text-emerald-300">${data.downloads}</p>
          </div>
        </div>

        <!-- Access log -->
        <h2 class="text-sm font-semibold text-white/60 uppercase tracking-wide mb-4">Access Log</h2>
        ${data.logs && data.logs.length > 0 ? `
          <div class="bg-white/3 border border-white/8 rounded-2xl overflow-hidden">
            <table class="w-full">
              <thead><tr class="border-b border-white/8">
                <th class="text-left px-6 py-3 text-xs font-medium text-white/30 uppercase tracking-wide">Action</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-white/30 uppercase tracking-wide">Time</th>
                <th class="text-left px-6 py-3 text-xs font-medium text-white/30 uppercase tracking-wide">IP</th>
              </tr></thead>
              <tbody>
                ${data.logs.map((log, i) => `
                  <tr class="${i < data.logs.length - 1 ? 'border-b border-white/5' : ''}">
                    <td class="px-6 py-3">
                      <span class="px-2 py-1 rounded-md text-xs font-medium ${log.action === 'download' ? 'bg-emerald-500/10 text-emerald-300' : 'bg-indigo-500/10 text-indigo-300'}">${log.action}</span>
                    </td>
                    <td class="px-6 py-3 text-xs text-white/40">${new Date(log.accessed_at).toLocaleString()}</td>
                    <td class="px-6 py-3 text-xs text-white/30 font-mono">${log.ip_address}</td>
                  </tr>`).join("")}
              </tbody>
            </table>
          </div>` : `<div class="border border-white/8 border-dashed rounded-2xl p-10 text-center text-white/20 text-sm">No access events yet</div>`}
      `;
    }

    function copyLink() {
      const btn = document.getElementById("copy-btn");
      navigator.clipboard.writeText(`${BASE_URL}docs/?slug=${slug}`);
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy Link", 2000);
    }

    function openModal(action) {
      currentAction = action;
      const modal = document.getElementById("modal");
      const newPwWrap = document.getElementById("modal-new-pw-wrap");
      document.getElementById("modal-title").textContent = action === 'remove' ? 'Remove Password' : (docHasPassword ? 'Change Password' : 'Add Password');
      document.getElementById("modal-desc").textContent = action === 'remove'
        ? 'This will make the document publicly accessible. Confirm with your admin password.'
        : 'Confirm with your admin password to update the recipient password.';
      newPwWrap.classList.toggle("hidden", action === 'remove');
      document.getElementById("modal-pw").value = "";
      document.getElementById("modal-new-pw").value = "";
      document.getElementById("modal-error").classList.add("hidden");
      modal.classList.remove("hidden");
    }

    document.getElementById("modal-cancel").addEventListener("click", () => {
      document.getElementById("modal").classList.add("hidden");
    });

    document.getElementById("modal-confirm").addEventListener("click", async () => {
      const adminPw = document.getElementById("modal-pw").value;
      const newPw = currentAction === 'remove' ? null : document.getElementById("modal-new-pw").value;
      const errEl = document.getElementById("modal-error");
      const btn = document.getElementById("modal-confirm");

      if (!adminPw) { errEl.textContent = "Admin password required."; errEl.classList.remove("hidden"); return; }
      if (currentAction === 'change' && !newPw) { errEl.textContent = "New password required."; errEl.classList.remove("hidden"); return; }

      btn.disabled = true;
      btn.textContent = "Confirming...";
      errEl.classList.add("hidden");

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/update-doc-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ slug, new_password: newPw, admin_password: adminPw }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        document.getElementById("modal").classList.add("hidden");
        docHasPassword = data.has_password;
        // Reload page data
        init();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("hidden");
      } finally {
        btn.disabled = false;
        btn.textContent = "Confirm";
      }
    });

    document.getElementById("modal-pw").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("modal-confirm").click();
    });

    init();
  </script>
</body>
</html>
