<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse DMS — Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M9 8h9l5 5v11a1 1 0 01-1 1H9a1 1 0 01-1-1V9a1 1 0 011-1z' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cpath d='M18 8v5h5' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cline x1='11' y1='17' x2='21' y2='17' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='11' y1='20' x2='18' y2='20' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#080810] text-white min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="flex items-center gap-2 justify-center mb-8">
      <div class="w-8 h-8 rounded-lg bg-indigo-500/30 border border-indigo-400/40 flex items-center justify-center">
        <svg class="w-4 h-4 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <span class="text-sm font-semibold text-white/80 tracking-tight">Lighthouse DMS</span>
    </div>

    <!-- Card -->
    <div class="bg-white/5 border border-white/10 rounded-2xl p-8">
      <h1 class="text-xl font-bold text-white mb-1">Team Login</h1>
      <p class="text-white/40 text-sm mb-6">Sign in to manage documents</p>

      <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wide">Email</label>
      <input id="email" type="email" placeholder="you@cresta.ai"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 text-sm outline-none focus:border-indigo-500/60 focus:bg-white/8 transition-all mb-4" />

      <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wide">Password</label>
      <input id="password" type="password" placeholder="••••••••"
        class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 text-sm outline-none focus:border-indigo-500/60 transition-all mb-6" />

      <button id="login-btn"
        class="w-full py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-semibold transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed">
        Sign In
      </button>

      <p id="error-msg" class="text-red-400 text-xs mt-4 hidden"></p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "dashboard/";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errEl = document.getElementById("error-msg");
      const btn = document.getElementById("login-btn");
      errEl.classList.add("hidden");
      btn.disabled = true;
      btn.textContent = "Signing in...";
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message;
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Sign In";
      } else {
        window.location.href = "dashboard/";
      }
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });
  </script>
</body>
</html>
