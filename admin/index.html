  <style>
    body { display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 380px; padding: 24px; }

    .error { color: #ef4444; font-size: 13px; margin-top: 12px; display: none; }

</head>
<body>

  <div class="login-wrap">
    <div class="logo-center">

        <path d="M739.56,51.7h-36.13v88.23l-15.15.03V51.72l-36.13-.03v-13.71h87.41v13.71h0ZM536.43,51.7h-59.25v29.06h46.02v13.14h-46.02v32.33h59.25v13.71h-73.95V37.99h73.95v13.7h0ZM321.45,108.69l-.54-.28-.29.54c-6.66,12.57-18.47,20.09-33.1,20.09-22.32,0-38.89-17.12-38.89-40.08s16.57-40.08,38.89-40.08c14.63,0,26.45,7.52,33.1,20.09l.3.52.53-.26,11.72-6.01.57-.3-.3-.54c-8.97-17.03-26.01-27.36-45.92-27.36-29.79,0-53.2,23.26-53.2,53.93s23.41,53.93,53.2,53.93c19.91,0,36.95-10.34,45.92-27.36l.3-.55-.56-.29-11.72-6.01v.02ZM631.2,92.66c-4.9-4.58-11.7-7.72-19.59-9.56l-19.84-4.52-1.16-.27c-5.65-1.4-9.56-3.23-12.06-5.47-2.54-2.28-3.81-5.13-3.81-9.02s2.01-7.75,5.86-10.51c3.9-2.79,9.69-4.58,16.94-4.61,14.95-.06,23,7.6,27.65,18.47l12.41-6.35c-5.29-15.6-18.73-25.78-39.92-25.78s-38.3,12.09-38.3,29.33c0,7.78,3.11,14.1,8.32,18.88,5.14,4.71,12.24,7.86,20.23,9.68l17.38,3.93c6.6,1.51,11.26,3.45,14.22,5.89,2.82,2.32,4.22,5.17,4.22,9.01,0,5.43-2.35,9.71-6.53,12.72-4.27,3.07-10.61,4.92-18.55,4.92-8.54,0-15.11-2.35-20.01-6.09-4.71-3.59-7.41-7.48-10.75-14.34l-12.03,6.16c5.01,15,19.89,27.78,42.8,27.78s40.57-12.52,40.57-31.57c0-7.61-2.94-13.89-8.07-18.68h.02ZM820.45,139.96h16.04l-34.65-92.38c-2.42-6.78-8.61-11.16-15.82-11.16h-.03c-7.22,0-13.41,4.4-15.81,11.2l-34.54,92.33h16.03l8.86-23.5h51.02l8.89,23.5h.01ZM765.62,103.01l19.09-52.81c.48-1.32,2.35-1.32,2.82,0l18.96,52.81h-40.87ZM410.5,99.15c12.17-1.81,27.02-13.18,27.02-30.65s-12.52-30.5-33.79-30.5h-46.16v101.94h14.56v-42.46c0-1.35,1.63-2.01,2.57-1.05l42.46,43.5h18.76l-39.84-40.24c7.21,0,11.44-.15,14.4-.54h.02ZM372.15,51.68h31.59c12.09,0,18.93,6.91,18.93,16.82s-6.84,18.49-18.93,18.49h-31.59v-35.3h0Z"/>
      </svg></a>
      <span style="color:var(--text-3);font-size:13px;font-weight:500;">DMS</span>
    </div>

    <div class="dms-card" style="padding:32px;">
      <h1>Team Login</h1>
      <p class="sub">Sign in to manage documents</p>

      <label class="dms-label">Email</label>
      <input id="email" type="email" placeholder="you@cresta.ai" class="dms-input" style="margin-bottom:14px;" />

      <label class="dms-label">Password</label>
      <input id="password" type="password" placeholder="••••••••" class="dms-input" style="margin-bottom:20px;" />

      <button id="login-btn" class="btn-primary" style="width:100%;">Sign In</button>

      <div style="display:flex;align-items:center;gap:10px;margin:16px 0;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span style="font-size:12px;color:var(--text-3);">or</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <button id="passkey-login-btn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:10px;background:var(--bg-subtle);border:1px solid var(--border);color:var(--text-2);font-size:13px;font-weight:500;cursor:pointer;transition:background 0.15s;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
        Sign in with Passkey
      </button>

      <div class="error" id="error-msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1d3ZydW9rZnJiaXpqaXlvYnJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjEzNTYsImV4cCI6MjA5NTk5NzM1Nn0.gLH11eXQVoxfdHovVMuWgG9ydYxPPu3bI2Ony2MmUsc";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = "dashboard/";
    });

    document.getElementById("login-btn").addEventListener("click", async () => {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errEl    = document.getElementById("error-msg");
      const btn      = document.getElementById("login-btn");
      errEl.style.display = "none";
      btn.disabled = true; btn.textContent = "Signing in…";
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = error.message; errEl.style.display = "block";
        btn.disabled = false; btn.textContent = "Sign In";
      } else { window.location.href = "dashboard/"; }
    });
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("login-btn").click();
    });

    document.getElementById("passkey-login-btn").addEventListener("click", async () => {
      const email  = document.getElementById("email").value.trim();
      const errEl  = document.getElementById("error-msg");
      const btn    = document.getElementById("passkey-login-btn");
      errEl.style.display = "none";

      if (!email) {
        errEl.textContent = "Enter your email first, then click Sign in with Passkey.";
        errEl.style.display = "block"; return;
      }
      if (typeof SimpleWebAuthnBrowser === "undefined") {
        errEl.textContent = "WebAuthn not available. Please refresh.";
        errEl.style.display = "block"; return;
      }

      btn.disabled = true; btn.querySelector("span") ? null : null;
      btn.innerHTML = `<svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Verifying…`;

      try {
        // 1. Get auth options
        const startRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-auth-start`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": "${SUPABASE_ANON_KEY}" },
          body: JSON.stringify({ email }),
        });
        const startData = await startRes.json();
        if (!startRes.ok) throw new Error(startData.error);

        const { user_id, ...options } = startData;

        // 2. Trigger authenticator
        const credential = await SimpleWebAuthnBrowser.startAuthentication(options);

        // 3. Verify + get token
        const finishRes = await fetch(`${SUPABASE_URL}/functions/v1/passkey-auth-finish`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": "${SUPABASE_ANON_KEY}" },
          body: JSON.stringify({ credential, user_id }),
        });
        const finishData = await finishRes.json();
        if (!finishRes.ok) throw new Error(finishData.error);

        // 4. Exchange token for session
        const { error: verifyError } = await sb.auth.verifyOtp({
          token_hash: finishData.token_hash,
          type: "magiclink",
        });
        if (verifyError) throw verifyError;

        window.location.href = "dashboard/";
      } catch (err) {
        errEl.textContent =
          err.message?.includes("NotAllowedError") || err.message?.includes("cancelled") ? "Passkey authentication was cancelled." :
          err.message?.includes("No passkey") ? "No passkey registered for this account. Set one up after signing in." :
          err.message || "Passkey sign-in failed.";
        errEl.style.display = "block";
        btn.disabled = false;
        btn.innerHTML = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg> Sign in with Passkey`;
      }
    });
  </script>
  <style>.spin{animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
</body>
</html>
