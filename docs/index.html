<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse DMS — Document Access</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Cpath d='M9 8h9l5 5v11a1 1 0 01-1 1H9a1 1 0 01-1-1V9a1 1 0 011-1z' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cpath d='M18 8v5h5' fill='none' stroke='white' stroke-width='1.5' stroke-linejoin='round'/%3E%3Cline x1='11' y1='17' x2='21' y2='17' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3Cline x1='11' y1='20' x2='18' y2='20' stroke='white' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>* { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#080810] text-white min-h-screen flex flex-col">

  <header class="border-b border-white/8 px-6 py-4">
    <div class="max-w-5xl mx-auto flex items-center gap-2">
      <div class="w-7 h-7 rounded-lg bg-indigo-500/30 border border-indigo-400/40 flex items-center justify-center">
        <svg class="w-3.5 h-3.5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <span class="text-sm font-semibold text-white/70 tracking-tight">Lighthouse DMS</span>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-4 py-12">

    <!-- Password gate -->
    <div id="gate" class="w-full max-w-sm">
      <div class="bg-white/5 border border-white/10 rounded-2xl p-8">
        <div class="w-10 h-10 rounded-xl bg-indigo-500/20 border border-indigo-500/30 flex items-center justify-center mb-5">
          <svg class="w-5 h-5 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-white mb-1">Access Document</h1>
        <p class="text-white/40 text-sm mb-6">Enter the password provided by your Cresta contact.</p>

        <label class="block text-xs font-medium text-white/50 mb-2 uppercase tracking-wide">Password</label>
        <input type="password" id="pw-input" placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 text-sm outline-none focus:border-indigo-500/60 transition-all mb-4" />

        <button id="pw-btn"
          class="w-full py-3 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-semibold transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/25 disabled:opacity-50 disabled:cursor-not-allowed">
          Access Document
        </button>
        <p id="pw-error" class="text-red-400 text-xs mt-3 hidden"></p>
      </div>
    </div>

    <!-- Viewer -->
    <div id="viewer" class="hidden w-full max-w-5xl">
      <div class="flex items-start justify-between mb-6 flex-wrap gap-4">
        <div>
          <h1 id="doc-title" class="text-2xl font-bold text-white mb-1"></h1>
          <p id="doc-desc" class="text-white/40 text-sm"></p>
        </div>
        <button id="download-btn"
          class="px-5 py-2.5 rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white text-sm font-semibold transition-all hover:shadow-lg hover:shadow-indigo-500/25">
          Download
        </button>
      </div>
      <div id="view-area" class="rounded-2xl overflow-hidden border border-white/10"></div>
      <p class="text-white/20 text-xs mt-4 text-center">Access link expires in 15 minutes. Refresh and re-enter your password to renew.</p>
    </div>

  </main>

  <script>
    const SUPABASE_URL = "https://yuwvruokfrbizjiyobrx.supabase.co";
    const slug = new URLSearchParams(window.location.search).get("slug");
    let signedUrl = null;
    let documentId = null;

    if (!slug) {
      document.getElementById("gate").innerHTML = `<div class="text-center text-white/30 py-20"><p class="text-lg font-medium">No document specified</p><p class="text-sm mt-2">Check your link and try again.</p></div>`;
    }

    document.getElementById("pw-btn").addEventListener("click", async () => {
      const password = document.getElementById("pw-input").value;
      const errEl = document.getElementById("pw-error");
      const btn = document.getElementById("pw-btn");
      errEl.classList.add("hidden");
      btn.disabled = true;
      btn.textContent = "Verifying...";

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/verify-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ slug, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || "Incorrect password.";
          errEl.classList.remove("hidden");
          btn.disabled = false;
          btn.textContent = "Access Document";
          return;
        }

        signedUrl = data.signed_url;
        documentId = data.document_id;
        document.getElementById("doc-title").textContent = data.name;
        document.getElementById("doc-desc").textContent = data.description || "";
        document.getElementById("gate").classList.add("hidden");
        document.getElementById("viewer").classList.remove("hidden");

        const viewArea = document.getElementById("view-area");
        if (signedUrl.match(/\.pdf|pdf/i)) {
          viewArea.innerHTML = `<iframe src="${signedUrl}" class="w-full h-[75vh] border-0"></iframe>`;
        } else if (signedUrl.match(/\.(jpg|jpeg|png)/i)) {
          viewArea.innerHTML = `<img src="${signedUrl}" class="max-w-full rounded-2xl" />`;
        } else if (signedUrl.match(/\.mp4/i)) {
          viewArea.innerHTML = `<video src="${signedUrl}" controls class="w-full rounded-2xl"></video>`;
        } else {
          viewArea.innerHTML = `<div class="p-10 text-center text-white/30 text-sm">Preview not available. Use the Download button.</div>`;
        }
      } catch (err) {
        errEl.textContent = "Something went wrong. Please try again.";
        errEl.classList.remove("hidden");
        btn.disabled = false;
        btn.textContent = "Access Document";
      }
    });

    document.getElementById("download-btn").addEventListener("click", async () => {
      if (!signedUrl) return;
      if (documentId) {
        fetch(`${SUPABASE_URL}/functions/v1/log-access`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ document_id: documentId, action: "download" }),
        });
      }
      const a = document.createElement("a");
      a.href = signedUrl;
      a.download = "";
      a.click();
    });

    document.getElementById("pw-input").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("pw-btn").click();
    });
  </script>
</body>
</html>
