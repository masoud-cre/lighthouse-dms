  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&display=swap');
    * { font-family: 'Barlow', sans-serif; }

    @keyframes letterReveal {
      0%   { opacity:0; transform:translateY(24px); filter:blur(12px); }
      60%  { opacity:0.8; transform:translateY(-2px); filter:blur(2px); }
      100% { opacity:1; transform:translateY(0); filter:blur(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes gradientShift {
      0%,100% { background-position:0% 50%; }
      50%     { background-position:100% 50%; }
    }
    /* Carousel */
    @keyframes scrollLeft {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .letter {
      display:inline-block; opacity:0;
      animation: letterReveal 0.7s cubic-bezier(0.23,1,0.32,1) forwards;
    }
    .gradient-text {
      background: linear-gradient(135deg,#ffffff 0%,#a5b4fc 40%,#83A8FE 70%,#ffffff 100%);
      background-size:300% 300%;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      animation: gradientShift 6s ease infinite;
    }
    .fade-up { opacity:0; animation: fadeUp 0.8s cubic-bezier(0.23,1,0.32,1) forwards; }
    .noise {
      position:fixed; inset:0; pointer-events:none; opacity:0.03;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }
    .glow-orb { position:absolute; border-radius:50%; filter:blur(80px); animation:fadeUp 1.5s ease forwards; }

    /* 3D flip tiles */
    :root {
      --tile: 120px;
      --gap:  8px;
      --tdeg: 90deg;
      --dr:   180ms;
      --tf:   ease-out;
      --pr:   400px;
    }
    .tiles { font-size:0; padding:0; list-style:none; display:flex; flex-wrap:wrap; justify-content:center; gap:var(--gap); }
    .tile {
      position:relative; width:var(--tile); height:var(--tile);
      display:inline-block; vertical-align:top;
      perspective:var(--pr);
      transform-origin: 50% 50% calc(var(--tile)/2);
    }
    .tile-w {
      position:absolute; inset:0;
      pointer-events:none;
      transform-style:preserve-3d;
      transform-origin: 50% 50% calc(var(--tile) / 2 * -1);
      will-change:transform;
      animation:var(--dr) var(--tf) 0ms 1 normal forwards paused;
    }
    .tile-f, .tile-b {
      position:absolute; inset:0; border-radius:12px;
    }
    .tile-f {
      background: linear-gradient(135deg, #304FFE, #170B32);
      display:flex; align-items:center; justify-content:center;
    }
    .tile-f svg { opacity:0.25; }
    .tile-b {
      padding:12px;
      background: radial-gradient(circle, #1e1442, #0a0620 160%);
      border:1px solid rgba(48,79,254,0.2);
      display:flex; align-items:center; justify-content:center;
      text-align:center;
      font-size:13px; font-weight:600; color:#83A8FE;
      line-height:1.3;
    }
    /* back face initial transforms per direction */
    .in-top .tile-b,.out-top .tile-b         { transform-origin:0% 100%; transform:translate3d(0,-100%,0) rotate3d(1,0,0,90deg); }
    .in-right .tile-b,.out-right .tile-b     { transform-origin:0% 0%;   transform:translate3d(100%,0,0) rotate3d(0,1,0,90deg); }
    .in-bottom .tile-b,.out-bottom .tile-b   { transform-origin:0% 0%;   transform:translate3d(0,100%,0) rotate3d(-1,0,0,90deg); }
    .in-left .tile-b,.out-left .tile-b       { transform-origin:100% 0;  transform:translate3d(-100%,0,0) rotate3d(0,-1,0,90deg); }
    /* active animations */
    .in-top .tile-w    { animation-name:in-top;    animation-play-state:running }
    .in-right .tile-w  { animation-name:in-right;  animation-play-state:running }
    .in-bottom .tile-w { animation-name:in-bottom; animation-play-state:running }
    .in-left .tile-w   { animation-name:in-left;   animation-play-state:running }
    .out-top .tile-w    { animation-name:out-top;    animation-play-state:running }
    .out-right .tile-w  { animation-name:out-right;  animation-play-state:running }
    .out-bottom .tile-w { animation-name:out-bottom; animation-play-state:running }
    .out-left .tile-w   { animation-name:out-left;   animation-play-state:running }
    @keyframes in-top    { from{transform:rotate3d(0,0,0,0deg)} to{transform:rotate3d(-1,0,0,var(--tdeg))} }
    @keyframes out-top   { from{transform:rotate3d(-1,0,0,var(--tdeg))} to{transform:rotate3d(0,0,0,0deg)} }
    @keyframes in-right  { from{transform:rotate3d(0,0,0,0deg)} to{transform:rotate3d(0,-1,0,var(--tdeg))} }
    @keyframes out-right { from{transform:rotate3d(0,-1,0,var(--tdeg))} to{transform:rotate3d(0,0,0,0deg)} }
    @keyframes in-bottom { from{transform:rotate3d(0,0,0,0deg)} to{transform:rotate3d(1,0,0,var(--tdeg))} }
    @keyframes out-bottom{ from{transform:rotate3d(1,0,0,var(--tdeg))} to{transform:rotate3d(0,0,0,0deg)} }
    @keyframes in-left   { from{transform:rotate3d(0,0,0,0deg)} to{transform:rotate3d(0,1,0,var(--tdeg))} }
    @keyframes out-left  { from{transform:rotate3d(0,1,0,var(--tdeg))} to{transform:rotate3d(0,0,0,0deg)} }
  </style>
</head>

  <style>

  <script>
    // Per-letter heading animation
    const text = "Share docs.\nNot passwords.";
    const heading = document.getElementById("hero-heading");
    let li = 0;
    text.split("").forEach(char => {
      if (char === "\n") { heading.appendChild(document.createElement("br")); return; }
      const s = document.createElement("span");
      s.className = "letter";
      s.textContent = char;
      s.style.animationDelay = `${0.4 + li++ * 0.045}s`;
      heading.appendChild(s);
    });

    // 3D flip tiles
    const phrases = [
      "Gated DMS", "Upload once", "Share securely", "Track views",
      "Track downloads", "Password protected", "Signed URLs", "Access analytics",
    ];
    const tileIcons = [
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
      '<svg width="40" height="40" fill="none" stroke="white" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>',
    ];

    const tilesEl = document.getElementById("tiles");
    phrases.forEach((phrase, idx) => {
      const li = document.createElement("li");
      li.className = "tile";
      li.innerHTML = `
        <div class="tile-w">
          <div class="tile-f">${tileIcons[idx]}</div>
          <div class="tile-b">${phrase}</div>
        </div>`;
      tilesEl.appendChild(li);

      // Direction-aware hover
      function getDir(ev, el) {
        const r = el.getBoundingClientRect();
        const x = ev.clientX - r.left - r.width / 2;
        const y = ev.clientY - r.top - r.height / 2;
        return ['top','right','bottom','left'][(Math.round(Math.atan2(y,x)/1.57079633+5))%4];
      }
      li.addEventListener("mouseenter", ev => {
        const d = getDir(ev, li);
        li.classList.remove("in-top","in-right","in-bottom","in-left","out-top","out-right","out-bottom","out-left");
        void li.offsetWidth; // reflow
        li.classList.add(`in-${d}`);
      });
      li.addEventListener("mouseleave", ev => {
        const d = getDir(ev, li);
        li.classList.remove("in-top","in-right","in-bottom","in-left","out-top","out-right","out-bottom","out-left");
        void li.offsetWidth;
        li.classList.add(`out-${d}`);
      });
    });

  </script>
</body>
