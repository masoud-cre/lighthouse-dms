name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-functions:
    name: Deploy Supabase Edge Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Supabase CLI
        run: npm install -g supabase

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in upload-doc verify-password log-access get-analytics \
                    update-doc-password admin-view-doc admin-users \
                    passkey-register-start passkey-register-finish \
                    passkey-auth-start passkey-auth-finish; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" \
              --project-ref yuwvruokfrbizjiyobrx \
              --no-verify-jwt
          done

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: deploy-functions
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
